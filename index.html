<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
  </head>
  <body class="min-h-screen flex justify-center items-center bg-orange-200">
    <div
      class="container bg-white flex flex-row overflow-hidden"
      style="height: 550px; width: 720px; border-radius: 10px"
    >
      <div class="left">
        <img
          style="height: 550px; overflow: hidden; margin-bottom: 20px"
          src="image-product-desktop.jpg"
          alt=""
        />
      </div>
      <div class="right">
        <h2 class="p-10">PERFUME</h2>
        <h1 class="pl-10" style="font-size: 25px">
          <b
            >Gabrielle <br />
            Essence Eau <br />
            De Parfum</b
          >
        </h1>
        <p class="p-10 text-gray-500">
          A floral, solar and voluptuous <br />
          interpretation composed by <br />
          Olivier Polge, Perfumer-Creator <br />
          for the House of CHANEL.
        </p>
        <div class="kanwa flex flex-row pl-10 justify-around">
          <h1 class="text-green-600" style="font-size: 40px">
            <b>$149.99</b>
          </h1>
          <h4 class="text-gray-500">$169.99</h4>
        </div>
        <button
          class="p-5 pl-24 pr-24 ml-10 bg-green-600 text-white"
          style="border-radius: 10px; font-size: 20px"
        >
          Add to Cart
        </button>
      </div>
    </div>
  </body>
</html>
